<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Untuk Mamih ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;
      background: linear-gradient(135deg,#ff9ecf,#ff5fa2);
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    /* LOVE BACKGROUND */
    .heart{
      position:absolute;
      color:rgba(255,255,255,0.7);
      font-size:20px;
      animation: floatUp linear infinite;
      user-select:none;
    }

    @keyframes floatUp{
      0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }
      20%{
        opacity:1;
      }
      100%{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
      }
    }

    .container{
      width:90%;
      max-width:420px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:25px;
      padding:25px;
      text-align:center;
      color:white;
      box-shadow:0 0 25px rgba(0,0,0,0.2);
      z-index:10;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .photo{
      width:180px;
      height:180px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid white;
      margin-bottom:20px;
      box-shadow:0 0 20px rgba(255,255,255,0.4);
    }

    h1{
      margin-bottom:15px;
      font-size:28px;
    }

    .text-box{
      min-height:120px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
      font-size:18px;
      line-height:1.7;
      transition:0.3s;
    }

    .buttons{
      margin-top:20px;
      display:flex;
      justify-content:center;
      gap:15px;
    }

    button{
      border:none;
      padding:12px 22px;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .prev{
      background:white;
      color:#ff4f95;
    }

    .next{
      background:#ff2f7d;
      color:white;
    }

    button:hover{
      transform:scale(1.05);
    }

    .footer{
      margin-top:20px;
      font-size:13px;
      opacity:0.8;
    }
  </style>
</head>
<body>

  <!-- LOVE BACKGROUND -->
  <div id="hearts"></div>

  <div class="container">

    <!-- FOTO -->
    <!-- GANTI FOTO DI LINK SRC -->
    <img 
      src="https://files.catbox.moe/7x9w9m.jpg" 
      class="photo"
    />

    <h1>Untuk Mamih ❤️</h1>

    <!-- TEXT -->
    <div class="text-box" id="textBox">
      makasih ya udh mau bantu kahfi selama ini
    </div>

    <!-- BUTTON -->
    <div class="buttons">
      <button class="prev" onclick="prevText()">⬅ Sebelumnya</button>
      <button class="next" onclick="nextText()">Lanjut ➜</button>
    </div>

    <div class="footer">
      dibuat dengan sayang ❤️
    </div>

  </div>

  <script>
    // LIST KATA-KATA
    const texts = [
      "makasih ya udh mau bantu kahfi selama ini ❤️",

      "maaf kadang suka bikin kecewa mamih 😔",

      "maaf kalo ada apa' kahfi gk bs bantu banyak apalagi tentang duit 💔",

      "kahfi juga mau bantu lebih banyak lagi, seperti anak di luar sana yg serba ada untuk orng tuanya ✨",

      "pokoknya mamih udh di anggap ibu sama kahfi and zahra 🤍",

      "MAKASIH BANYAK YA UDH SELALU BANTU, KAHFI AKAN BERUSAHA MEMENUHI HARAPAN MAMIH KE KAHFI ❤️"
    ];

    let index = 0;

    const textBox = document.getElementById("textBox");

    function updateText(){
      textBox.style.opacity = 0;

      setTimeout(() => {
        textBox.innerHTML = texts[index];
        textBox.style.opacity = 1;
      }, 200);
    }

    function nextText(){
      if(index < texts.length - 1){
        index++;
      }else{
        index = 0;
      }

      updateText();
    }

    function prevText(){
      if(index > 0){
        index--;
      }else{
        index = texts.length - 1;
      }

      updateText();
    }

    // LOVE EFFECT
    const heartsContainer = document.getElementById("hearts");

    function createHeart(){
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
      heart.style.fontSize = (Math.random() * 20 + 15) + "px";

      heartsContainer.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 250);
  </script>

</body>
</html>
